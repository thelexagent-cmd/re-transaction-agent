<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lex Market Intelligence — Globe Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #050a12; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
  #canvas-container { width: 100%; height: 100%; position: relative; }
  canvas { display: block; }

  /* Overlay UI */
  .ui-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 48px;
    gap: 16px;
  }

  .search-bar {
    pointer-events: all;
    width: 340px;
    background: rgba(8, 14, 26, 0.75);
    border: 1px solid rgba(59, 130, 246, 0.4);
    border-radius: 40px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(59,130,246,0.1), 0 8px 32px rgba(0,0,0,0.5);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:hover {
    border-color: rgba(59,130,246,0.7);
    box-shadow: 0 0 60px rgba(59,130,246,0.2), 0 8px 32px rgba(0,0,0,0.5);
  }
  .search-icon { color: rgba(59,130,246,0.7); font-size: 16px; flex-shrink: 0; }
  .search-input {
    background: transparent;
    border: none;
    outline: none;
    color: #e2e8f0;
    font-size: 14px;
    width: 100%;
    letter-spacing: 0.3px;
    pointer-events: all;
  }
  .search-input::placeholder { color: rgba(148,163,184,0.5); }
  .search-hint { color: rgba(148,163,184,0.35); font-size: 11px; white-space: nowrap; font-family: monospace; }

  .mode-pill {
    display: flex;
    background: rgba(8,14,26,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    backdrop-filter: blur(12px);
    pointer-events: all;
  }
  .pill-btn {
    padding: 7px 20px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    color: rgba(148,163,184,0.6);
    background: transparent;
  }
  .pill-btn.active {
    background: rgba(59,130,246,0.15);
    color: #93c5fd;
    border: 1px solid rgba(59,130,246,0.3);
  }

  /* Marker tooltip */
  .marker-tooltip {
    position: absolute;
    background: rgba(8,14,26,0.9);
    border: 1px solid rgba(59,130,246,0.4);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e2e8f0;
    pointer-events: none;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    display: none;
    min-width: 140px;
  }
  .marker-tooltip .zip { font-size: 10px; color: #60a5fa; font-family: monospace; margin-bottom: 2px; letter-spacing: 1px; }
  .marker-tooltip .city { font-size: 13px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
  .marker-tooltip .score-row { display: flex; align-items: center; gap: 6px; }
  .marker-tooltip .score-label { font-size: 10px; color: #64748b; }
  .marker-tooltip .score-val { font-size: 16px; font-weight: 700; color: #f59e0b; }

  /* Top label */
  .top-label {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(148,163,184,0.4);
    letter-spacing: 3px;
    font-family: monospace;
    text-transform: uppercase;
  }

  /* Loading */
  #loading {
    position: absolute;
    inset: 0;
    background: #050a12;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: rgba(148,163,184,0.6);
    font-size: 13px;
    letter-spacing: 1px;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(59,130,246,0.15); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span>LOADING GLOBE</span>
</div>

<div id="canvas-container">
  <div class="top-label">LEX MARKET INTELLIGENCE</div>
  <div class="marker-tooltip" id="tooltip">
    <div class="zip">33101</div>
    <div class="city">Miami, FL</div>
    <div class="score-row">
      <span class="score-label">SCORE</span>
      <span class="score-val">87</span>
    </div>
  </div>
  <div class="ui-overlay">
    <div class="mode-pill">
      <button class="pill-btn">Lex CRM</button>
      <button class="pill-btn active">Lex Market</button>
    </div>
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" placeholder="Enter ZIP code — e.g. 33101">
      <span class="search-hint">⏎</span>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');
const tooltip = document.getElementById('tooltip');
const loading = document.getElementById('loading');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a12);

// Camera
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 0, 2.8);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.insertBefore(renderer.domElement, container.firstChild);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.4;
controls.enableZoom = true;
controls.minDistance = 1.6;
controls.maxDistance = 4.5;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;

// Lights
const ambientLight = new THREE.AmbientLight(0x1a2744, 2.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
sunLight.position.set(3, 1, 2);
scene.add(sunLight);

const rimLight = new THREE.DirectionalLight(0x1d4ed8, 1.2);
rimLight.position.set(-3, -1, -2);
scene.add(rimLight);

// Stars background
function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 6000;
  const positions = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const phi = Math.acos(-1 + (2 * i) / count);
    const theta = Math.sqrt(count * Math.PI) * phi;
    const r = 80 + Math.random() * 20;
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    sizes[i] = Math.random() * 1.5 + 0.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true, transparent: true, opacity: 0.7 });
  scene.add(new THREE.Points(geo, mat));
}
createStars();

// Load textures
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

const earthGroup = new THREE.Group();
scene.add(earthGroup);

// Tilt the globe like real Earth
earthGroup.rotation.z = 0.41;

async function loadGlobe() {
  const dayTex = await new Promise(r => loader.load(
    'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
    r, undefined, () => {
      const c = document.createElement('canvas'); c.width=1024; c.height=512;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0,0,0,512);
      g.addColorStop(0,'#0a1628'); g.addColorStop(0.5,'#0e2240'); g.addColorStop(1,'#060e1a');
      ctx.fillStyle=g; ctx.fillRect(0,0,1024,512);
      r(new THREE.CanvasTexture(c));
    }
  ));

  const specTex = await new Promise(r => loader.load(
    'https://threejs.org/examples/textures/planets/earth_specular_2048.jpg',
    r, undefined, () => r(null)
  ));

  const normalTex = await new Promise(r => loader.load(
    'https://threejs.org/examples/textures/planets/earth_normal_2048.jpg',
    r, undefined, () => r(null)
  ));

  const cloudTex = await new Promise(r => loader.load(
    'https://threejs.org/examples/textures/planets/earth_clouds_1024.png',
    r, undefined, () => r(null)
  ));

  // Earth sphere
  const earthGeo = new THREE.SphereGeometry(1, 64, 64);
  const earthMat = new THREE.MeshPhongMaterial({
    map: dayTex,
    specularMap: specTex || undefined,
    normalMap: normalTex || undefined,
    specular: new THREE.Color(0x223366),
    shininess: 25,
    normalScale: new THREE.Vector2(0.85, 0.85),
  });
  const earthMesh = new THREE.Mesh(earthGeo, earthMat);
  earthGroup.add(earthMesh);

  // Cloud layer
  if (cloudTex) {
    const cloudGeo = new THREE.SphereGeometry(1.003, 64, 64);
    const cloudMat = new THREE.MeshPhongMaterial({
      map: cloudTex,
      transparent: true,
      opacity: 0.55,
      depthWrite: false,
    });
    const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
    cloudMesh.userData.cloudLayer = true;
    earthGroup.add(cloudMesh);
  }

  // Atmosphere glow
  const atmGeo = new THREE.SphereGeometry(1.08, 64, 64);
  const atmMat = new THREE.ShaderMaterial({
    uniforms: { glowColor: { value: new THREE.Color(0x1a6bff) } },
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 glowColor;
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.72 - dot(vNormal, vec3(0,0,1.0)), 3.5);
        gl_FragColor = vec4(glowColor, intensity * 0.9);
      }
    `,
    side: THREE.FrontSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });
  const atmMesh = new THREE.Mesh(atmGeo, atmMat);
  scene.add(atmMesh);

  // Outer haze ring
  const hazeGeo = new THREE.SphereGeometry(1.18, 64, 64);
  const hazeMat = new THREE.ShaderMaterial({
    uniforms: { glowColor: { value: new THREE.Color(0x0a3080) } },
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 glowColor;
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.6 - dot(vNormal, vec3(0,0,1.0)), 4.0);
        gl_FragColor = vec4(glowColor, intensity * 0.4);
      }
    `,
    side: THREE.FrontSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });
  scene.add(new THREE.Mesh(hazeGeo, hazeMat));

  // ZIP markers
  const markerObjects = [];
  const markers = [
    { lat: 25.77, lon: -80.19, zip: '33101', city: 'Miami, FL', score: 87, color: 0x3b82f6 },
    { lat: 25.95, lon: -80.14, zip: '33160', city: 'N. Miami Beach', score: 73, color: 0xf59e0b },
    { lat: 26.12, lon: -80.14, zip: '33312', city: 'Fort Lauderdale', score: 61, color: 0x34d399 },
    { lat: 25.69, lon: -80.44, zip: '33185', city: 'Kendall', score: 54, color: 0x60a5fa },
  ];

  markers.forEach(m => {
    const phi = (90 - m.lat) * (Math.PI / 180);
    const theta = (m.lon + 180) * (Math.PI / 180);
    const r = 1.015;
    const x = -(r * Math.sin(phi) * Math.cos(theta));
    const y = r * Math.cos(phi);
    const z = r * Math.sin(phi) * Math.sin(theta);

    const dotGeo = new THREE.SphereGeometry(0.012, 16, 16);
    const dotMat = new THREE.MeshBasicMaterial({ color: m.color });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(x, y, z);
    dot.userData = { marker: m };
    earthGroup.add(dot);
    markerObjects.push(dot);

    const ringGeo = new THREE.RingGeometry(0.018, 0.022, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: m.color, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(x, y, z);
    ring.lookAt(new THREE.Vector3(x*2, y*2, z*2));
    ring.userData = { pulse: true };
    earthGroup.add(ring);

    const ring2Geo = new THREE.RingGeometry(0.026, 0.028, 32);
    const ring2Mat = new THREE.MeshBasicMaterial({ color: m.color, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
    const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
    ring2.position.set(x, y, z);
    ring2.lookAt(new THREE.Vector3(x*2, y*2, z*2));
    ring2.userData = { pulse2: true, offset: Math.random() * Math.PI * 2 };
    earthGroup.add(ring2);
  });

  // Raycaster for hover
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('mousemove', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(markerObjects);
    if (hits.length > 0) {
      const m = hits[0].object.userData.marker;
      if (m) {
        tooltip.querySelector('.zip').textContent = m.zip;
        tooltip.querySelector('.city').textContent = m.city;
        tooltip.querySelector('.score-val').textContent = m.score;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX - renderer.domElement.getBoundingClientRect().left + 14) + 'px';
        tooltip.style.top = (e.clientY - renderer.domElement.getBoundingClientRect().top - 10) + 'px';
        controls.autoRotate = false;
      }
    } else {
      tooltip.style.display = 'none';
      controls.autoRotate = true;
    }
  });

  loading.style.opacity = '0';
  setTimeout(() => loading.style.display = 'none', 500);

  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    controls.update();

    earthGroup.children.forEach(child => {
      if (child.userData.pulse) {
        const s = 1 + 0.35 * Math.sin(t * 2.5);
        child.scale.setScalar(s);
        child.material.opacity = 0.6 * (1 - (s - 1) / 0.35) + 0.1;
      }
      if (child.userData.pulse2) {
        const s = 1 + 0.6 * Math.abs(Math.sin(t * 1.8 + child.userData.offset));
        child.scale.setScalar(s);
        child.material.opacity = 0.2 * (1.6 - s);
      }
      if (child.userData.cloudLayer) {
        child.rotation.y = t * 0.003;
      }
    });

    atmMesh.rotation.y = earthGroup.rotation.y;
    renderer.render(scene, camera);
  }
  animate();
}

loadGlobe().catch(console.error);

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
